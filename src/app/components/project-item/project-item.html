<body
  class="my-4 overflow-hidden grid grid-cols-5 grid-rows-1 w-full h-auto bg-(--background-color) border-solid border-3 {{
    borderColor
  }}"
>
  <div class="col-span-2 {{ bgcolor }}">
    <p class="font-(family-name:--header-font) text-3xl font-bold  p-6 {{ textColor }} medium-intro:text-4xl full-intro:text-5xl">
      {{header}}
    </p>
  </div>
  <div class="col-span-3">
    <img src="{{ image }}" />
  </div>
</body>
